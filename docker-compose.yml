version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: timesheets
      POSTGRES_USER: ts_user
      POSTGRES_PASSWORD: ts_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ts_user -d timesheets"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ts_user:ts_pass@db:5432/timesheets

volumes:
  pgdata:
