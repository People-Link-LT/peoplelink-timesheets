<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — PeopleLink Central</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm">
  <div class="mb-8 text-center">
    <p class="text-sm text-gray-400 uppercase tracking-widest font-medium">PeopleLink</p>
    <h1 class="text-2xl font-bold text-gray-800 mt-1">Create account</h1>
    <p class="text-sm text-gray-500 mt-2">You'll verify your email before signing in.</p>
  </div>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-5">{{ error }}</div>
  {% endif %}

  <form method="post" action="/register" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
      <input type="text" name="full_name" required autofocus
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required placeholder="you@peoplelink.lt"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p class="text-xs text-gray-400 mt-1">Must be a @peoplelink.lt address.</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required minlength="8"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2 text-sm transition">
      Create account
    </button>
  </form>
  <p class="text-center text-sm text-gray-500 mt-6">
    Already have an account? <a href="/login" class="text-blue-600 hover:underline">Sign in</a>
  </p>
</div>
</body>
</html>
