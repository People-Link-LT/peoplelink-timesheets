{% extends "base.html" %}
{% block title %}Admin — Teams{% endblock %}

{% block content %}
{% set active_page = "admin" %}
<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-bold text-gray-800">Teams</h1>
  <a href="/admin/users" class="bg-white border border-gray-300 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg hover:bg-gray-50 transition">Back to Users</a>
</div>

<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 mb-6">
  <h2 class="text-sm font-semibold text-gray-700 mb-4">Create team</h2>
  <form method="post" action="/admin/teams/create" class="flex gap-3 items-end">
    <div>
      <label class="block text-xs text-gray-500 mb-1">Team name</label>
      <input type="text" name="name" required
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
    </div>
    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg px-4 py-2 text-sm transition">
      Create
    </button>
  </form>
</div>

<div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-xs text-gray-500 border-b border-gray-100 bg-gray-50">
        <th class="text-left px-5 py-2 font-medium">Team name</th>
        <th class="text-left px-5 py-2 font-medium">Members</th>
        <th class="px-4 py-2"></th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-50">
      {% for t in teams %}
      <tr class="hover:bg-gray-50">
        <td class="px-5 py-2.5 font-medium text-gray-800">{{ t.name }}</td>
        <td class="px-5 py-2.5 text-gray-500">{{ t.users | length }}</td>
        <td class="px-4 py-2.5 text-right">
          <form method="post" action="/admin/teams/{{ t.id }}/delete"
                onsubmit="return confirm('Delete team {{ t.name }}?')">
            <button type="submit" class="text-xs text-red-400 hover:text-red-600 transition">Delete</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="px-5 py-6 text-center text-gray-400">No teams yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
