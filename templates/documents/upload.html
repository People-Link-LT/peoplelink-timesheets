{% extends "base.html" %}
{% block title %}Upload — PeopleLink Central{% endblock %}
{% block content %}

<div class="max-w-lg">
  <h1 class="text-xl font-semibold text-gray-900 mb-6">Upload File</h1>

  {% if success %}
  <div class="bg-green-50 border border-green-200 text-green-800 rounded-xl px-5 py-4 mb-5 text-sm flex items-start gap-3">
    <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    {{ success }}
  </div>
  {% endif %}
  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-800 rounded-xl px-5 py-4 mb-5 text-sm">
    <p class="font-semibold mb-0.5">Upload failed</p>
    <p class="font-mono text-xs">{{ error }}</p>
  </div>
  {% endif %}

  <form method="post" enctype="multipart/form-data" class="bg-white rounded-2xl border border-gray-200 p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">File</label>
      <input type="file" name="file" required
        class="block w-full text-sm text-gray-500
               file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0
               file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700
               hover:file:bg-blue-100 cursor-pointer">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">
        Destination folder
        <span class="text-gray-400 font-normal">(optional)</span>
      </label>
      <input type="text" name="folder" value="{{ default_folder }}"
        placeholder="e.g. Contracts/2026"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      <p class="text-xs text-gray-400 mt-1">Path within the SharePoint document library.</p>
    </div>

    <button type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm py-2.5 rounded-lg transition-colors">
      Upload to SharePoint
    </button>
  </form>

  <p class="mt-4 text-sm text-center">
    <a href="/documents" class="text-gray-400 hover:text-gray-600">← Back to Browse</a>
  </p>
</div>

{% endblock %}
