{% extends "base.html" %}
{% block title %}Atostogų įsakymai – PeopleLink Central{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Atostogų įsakymai</h1>
  <p class="text-sm text-gray-500 mt-1">Automatinis įsakymų generavimas iš SharePoint</p>
</div>

<div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
  <form hx-post="/automation/vacation-orders/preview"
        hx-target="#preview"
        hx-swap="innerHTML"
        hx-indicator="#spinner">
    <div class="flex items-end gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mėnuo</label>
        <select name="month" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          {% for num, name in months %}
          <option value="{{ num }}">{{ name }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit"
              class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 flex items-center gap-2">
        <svg id="spinner" class="htmx-indicator animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Peržiūrėti
      </button>
    </div>
  </form>
</div>

<div id="preview"></div>
{% endblock %}
